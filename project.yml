name: Snap
options:
  bundleIdPrefix: au.steamedhams
  deploymentTarget:
    macOS: "15.0"
  swiftVersion: "6.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: YOUR_TEAM_ID
    MARKETING_VERSION: 0.1
    CURRENT_PROJECT_VERSION: 1
    ARCHS: "arm64 x86_64"
    CODE_SIGN_STYLE: Manual
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG DEV_BUILD"
    Release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

targets:
  Snap:
    type: application
    platform: macOS
    sources:
      - path: Sources/Snap
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.steamedhams.snap
        INFOPLIST_FILE: Sources/Snap/App/Info.plist
        GENERATE_INFOPLIST_FILE: false
        COMBINE_HIDPI_IMAGES: true
    entitlements:
      path: Config/Snap.entitlements
    configFiles:
      Debug: Config/GeneratedBuildNumber.xcconfig
      Release: Config/GeneratedBuildNumber.xcconfig
    dependencies:
      - package: Sparkle

  SnapTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/SnapTests
    dependencies:
      - target: Snap

schemes:
  Snap:
    build:
      preActions:
        - script: |
            "${SRCROOT}/Scripts/set-build-number.sh"
          name: Set Build Number
          settingsTarget: Snap
      targets:
        Snap: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SnapTests
