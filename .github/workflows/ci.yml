name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install tools
        run: brew install xcodegen xcbeautify swiftlint

      - name: Generate project
        run: xcodegen generate

      - name: SwiftFormat check
        run: swiftformat --lint Sources/ Tests/

      - name: SwiftLint
        run: swiftlint lint --strict Sources/ Tests/

      - name: Build (Debug)
        run: |
          xcodebuild build \
            -scheme Pane \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Build (Release)
        run: |
          xcodebuild build \
            -scheme Pane \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Test
        run: |
          xcodebuild test \
            -scheme Pane \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
