name: Release

on:
  pull_request:
    branches: [release]
  push:
    tags:
      - "v*"

jobs:
  archive:
    name: Archive
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install tools
        run: brew install xcodegen xcbeautify swiftlint

      - name: Generate project
        run: xcodegen generate

      - name: SwiftLint
        run: swiftlint lint --strict Sources/ Tests/

      - name: Resolve version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-pr"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Archive (Release)
        run: |
          xcodebuild archive \
            -scheme Pane \
            -configuration Release \
            -archivePath build/Pane.xcarchive \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      # TODO(#19): Replace ad-hoc signing above with Developer ID certificate,
      # then notarize and staple before creating the DMG.

      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Pane.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist Config/ExportOptions.plist \
            | xcbeautify

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          hdiutil create \
            -volname "Pane ${VERSION}" \
            -srcfolder build/export/Pane.app \
            -ov \
            -format UDZO \
            "build/Pane-${VERSION}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pane-${{ steps.version.outputs.version }}.dmg
          path: build/Pane-${{ steps.version.outputs.version }}.dmg

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: archive
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: Pane-${{ steps.version.outputs.version }}.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pane ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: Pane-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
