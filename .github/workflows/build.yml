name: Build & Test

on:
  push:
    branches:
      - "feat/**"
      - "fix/**"

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install tools
        run: brew install xcodegen xcbeautify

      - name: Generate build number xcconfig
        run: bash Scripts/set-build-number.sh

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build-for-testing \
            -scheme Snap \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Test
        run: |
          xcodebuild test-without-building \
            -scheme Snap \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
